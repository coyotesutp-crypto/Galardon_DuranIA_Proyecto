<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfil del Productor</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(145deg, #eef2f7, #d9e2ec);
            padding: 30px;
            margin: 0;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: white;
            border-radius: 30px;
            padding: 30px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            position: relative;
        }
        h1 {
            color: #1e4b3c;
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .perfil-section {
            margin-bottom: 30px;
            border-bottom: 1px solid #e0e7ef;
            padding-bottom: 20px;
        }
        .perfil-section h2 {
            color: #2c7a4d;
            margin-bottom: 20px;
            font-size: 1.5rem;
        }
        .grid-2 {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
        }
        .campo {
            margin-bottom: 12px;
        }
        .campo strong {
            display: inline-block;
            width: 150px;
            color: #2c3e50;
        }
        .grupo-ganado {
            background: #f8fbfe;
            padding: 20px;
            border-radius: 20px;
            margin-bottom: 20px;
            border: 1px solid #e2f0ea;
        }
        .grupo-ganado h3 {
            color: #1e4b3c;
            margin-bottom: 15px;
        }
        .btn-pdf {
            background: #1e4b3c;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 40px;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.2s;
            margin-top: 20px;
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }
        .btn-pdf:hover {
            background: #14382d;
            transform: translateY(-2px);
        }
        .btn-volver {
            background: #6c757d;
            margin-left: 15px;
        }
        .btn-volver:hover {
            background: #5a6268;
        }
        .btn-cerrar {
            background: #dc3545;
            margin-left: 15px;
        }
        .btn-cerrar:hover {
            background: #c82333;
        }
        .loading {
            text-align: center;
            padding: 50px;
            font-size: 1.2rem;
            color: #1e4b3c;
        }
        .button-group {
            text-align: center;
            margin-top: 20px;
        }
        @media (max-width: 700px) {
            .grid-2 {
                grid-template-columns: 1fr;
            }
            .container {
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container" id="perfil-content">
        <div class="loading">
            <i class="fas fa-spinner fa-spin"></i> Cargando datos del productor...
        </div>
    </div>

    <script type="module">
        import { obtenerProductor } from './api.js';

        // Obtener el ID del productor (de la URL o de sessionStorage)
        const urlParams = new URLSearchParams(window.location.search);
        let productorId = urlParams.get('id');
        
        if (!productorId) {
            productorId = sessionStorage.getItem('productorId');
            if (!productorId) {
                window.location.href = 'login-productor.html';
                // No usar return aquí porque no estamos dentro de una función
            }
        }

        // Si tenemos ID, cargar el productor
        if (productorId) {
            cargarProductor(productorId);
        }

        async function cargarProductor(id) {
            try {
                const productor = await obtenerProductor(id);
                
                // Limpiar el loading y mostrar el perfil
                mostrarPerfil(productor);
                
                // Agregar botón de cerrar sesión
                agregarBotonCerrarSesion();
                
                // Agregar evento al botón de PDF (se crea en mostrarPerfil)
                const pdfBtn = document.getElementById('generarPDF');
                if (pdfBtn) {
                    pdfBtn.addEventListener('click', () => generarPDF(productor));
                }
                
            } catch (error) {
                console.error('Error cargando productor:', error);
                document.getElementById('perfil-content').innerHTML = `
                    <div style="text-align: center; padding: 40px;">
                        <i class="fas fa-exclamation-triangle" style="font-size: 3rem; color: #b91c1c;"></i>
                        <h2>Productor no encontrado</h2>
                        <p>El productor solicitado no existe o hubo un error en la conexión.</p>
                        <a href="ventanilla.html" class="btn-pdf" style="display: inline-block; margin-top: 20px;">Volver a ventanilla</a>
                    </div>
                `;
            }
        }

        function agregarBotonCerrarSesion() {
            // Verificar si ya existe el botón para no duplicar
            if (document.getElementById('cerrarSesionBtn')) return;
            
            const buttonGroup = document.querySelector('.button-group') || (() => {
                const group = document.createElement('div');
                group.className = 'button-group';
                document.getElementById('perfil-content').appendChild(group);
                return group;
            })();
            
            const cerrarBtn = document.createElement('button');
            cerrarBtn.id = 'cerrarSesionBtn';
            cerrarBtn.innerHTML = '<i class="fas fa-sign-out-alt"></i> Cerrar sesión';
            cerrarBtn.className = 'btn-pdf btn-cerrar';
            cerrarBtn.onclick = () => {
                sessionStorage.removeItem('productorId');
                sessionStorage.removeItem('productorUPP');
                window.location.href = 'login-productor.html';
            };
            buttonGroup.appendChild(cerrarBtn);
        }

        function calcularTotalCabezas(productor) {
            let total = 0;
            if (productor.gruposGanado) {
                productor.gruposGanado.forEach(grupo => {
                    total += (parseInt(grupo.vientres) || 0) +
                             (parseInt(grupo.crias) || 0) +
                             (parseInt(grupo.sementales) || 0) +
                             (parseInt(grupo.vaquillas) || 0) +
                             (parseInt(grupo.novillos) || 0) +
                             (parseInt(grupo.engorda) || 0) +
                             (parseInt(grupo.otras_cant) || 0);
                });
            }
            return total;
        }

        function mostrarPerfil(productor) {
            const totalCabezas = calcularTotalCabezas(productor);
            const html = `
                <h1><i class="fas fa-user-check"></i> Perfil del Productor</h1>
                
                <div class="perfil-section">
                    <h2>📋 Datos Personales</h2>
                    <div class="grid-2">
                        <div class="campo"><strong>Nombre:</strong> ${productor.nombre || 'N/A'}</div>
                        <div class="campo"><strong>Rancho:</strong> ${productor.rancho || 'N/A'}</div>
                        <div class="campo"><strong>Municipio:</strong> ${productor.municipio || 'N/A'}</div>
                        <div class="campo"><strong>Localidad:</strong> ${productor.localidad || 'N/A'}</div>
                        <div class="campo"><strong>Teléfono:</strong> ${productor.telefono || 'N/A'}</div>
                        <div class="campo"><strong>Folio:</strong> ${productor.folio || 'N/A'}</div>
                        <div class="campo"><strong>Fecha de alta:</strong> ${productor.fecha_alta ? new Date(productor.fecha_alta).toLocaleDateString() : 'N/A'}</div>
                        <div class="campo"><strong>Tenencia:</strong> ${productor.tenencia || 'N/A'}</div>
                        <div class="campo"><strong>Patente de Fierro:</strong> ${productor.patente || 'N/A'}</div>
                        <div class="campo"><strong>UPP:</strong> ${productor.upp || 'N/A'}</div>
                        <div class="campo"><strong>Registro UMA:</strong> ${productor.uma || 'N/A'}</div>
                        <div class="campo"><strong>Domicilio:</strong> ${productor.calle || ''} ${productor.colonia ? ', Col. ' + productor.colonia : ''}</div>
                    </div>
                </div>
                
                <div class="perfil-section">
                    <h2>🐄 Inventario Ganadero <span style="font-size: 1rem;">(Total: ${totalCabezas} cabezas)</span></h2>
                    ${productor.gruposGanado && productor.gruposGanado.length ? productor.gruposGanado.map((grupo, idx) => `
                        <div class="grupo-ganado">
                            <h3>Grupo ${idx+1}: ${grupo.especie.toUpperCase()} - Raza: ${grupo.raza || 'No especificada'} ${grupo.cruza ? '(Cruza)' : ''}</h3>
                            <div class="grid-2">
                                <div><i class="fas fa-female"></i> Vientres: ${grupo.vientres}</div>
                                <div><i class="fas fa-baby"></i> Crías: ${grupo.crias}</div>
                                <div><i class="fas fa-male"></i> Sementales: ${grupo.sementales}</div>
                                <div><i class="fas fa-female"></i> Vaquillas: ${grupo.vaquillas}</div>
                                <div><i class="fas fa-horse"></i> Novillos: ${grupo.novillos}</div>
                                <div><i class="fas fa-chart-line"></i> Engorda: ${grupo.engorda}</div>
                                ${grupo.otras_cant > 0 ? `<div><i class="fas fa-paw"></i> Otras (${grupo.otras_espec}): ${grupo.otras_cant}</div>` : ''}
                            </div>
                        </div>
                    `).join('') : '<p>No hay ganado registrado.</p>'}
                </div>
                
                <div class="button-group">
                    <button id="generarPDF" class="btn-pdf"><i class="fas fa-file-pdf"></i> Descargar constancia PDF</button>
                    <a href="ventanilla.html" class="btn-pdf btn-volver"><i class="fas fa-arrow-left"></i> Volver a ventanilla</a>
                </div>
            `;
            document.getElementById('perfil-content').innerHTML = html;
        }

        async function generarPDF(productor) {
            const element = document.getElementById('perfil-content');
            try {
                const canvas = await html2canvas(element, { scale: 2 });
                const imgData = canvas.toDataURL('image/png');
                const { jsPDF } = window.jspdf;
                const pdf = new jsPDF('p', 'mm', 'a4');
                const imgWidth = 190;
                const imgHeight = (canvas.height * imgWidth) / canvas.width;
                pdf.addImage(imgData, 'PNG', 10, 10, imgWidth, imgHeight);
                pdf.save(`perfil_${(productor.nombre || 'productor').replace(/\s/g, '_')}.pdf`);
            } catch (err) {
                console.error('Error generando PDF:', err);
                alert('Error al generar el PDF');
            }
        }
    </script>
</body>
</html>
