<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Acceso Administrativo - UGRD</title>
    <link rel="stylesheet" href="ugrd.css"> <style>
        body { background-color: #f4f1ea; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; font-family: sans-serif; }
        .admin-login-card { background: white; padding: 3rem; border-radius: 30px; box-shadow: 0 20px 40px rgba(26, 77, 46, 0.15); width: 100%; max-width: 400px; text-align: center; border-top: 8px solid #1a4d2e; }
        .form-group { margin-bottom: 1.5rem; text-align: left; }
        .form-group label { display: block; margin-bottom: 0.5rem; font-weight: bold; color: #1a4d2e; }
        .form-group input { width: 100%; padding: 12px; border: 2px solid #eee; border-radius: 10px; box-sizing: border-box; }
        .btn-admin { background: #1a4d2e; color: white; border: none; padding: 15px; width: 100%; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 1rem; }
        .btn-admin:hover { background: #d4a017; }
    </style>
</head>
<body>
    <div>
    <a href="Inicioreemo.html" class="btn-inicio" title="Volver al inicio">
        <img src="imagenes/casainicio.png" alt="casa" style="height: 150%;">
    </a>
</div>
<style>
    .btn-inicio {
        position: fixed;
        bottom: 30px;
        right: 30px;
        background: linear-gradient(145deg, #1e4b3c, #14382d);
        color: white;
        width: 60px;
        height: 60px;
        border-radius: 30px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 1.8rem;
        box-shadow: 0 8px 16px rgba(0,0,0,0.3);
        transition: 0.2s;
        text-decoration: none;
        z-index: 1000;
    }

    .btn-inicio:hover {
        transform: scale(1.1);
        background: #1e4b3c;
    }
</style>
    <div class="admin-login-card">
        <img src="urgd1.png" alt="Logo UGRD" style="width: 100px; margin-bottom: 1rem;">
        <h2 style="color: #1a4d2e; margin-bottom: 2rem;">SISTEMA REEMO<br><small>Panel Administrativo</small></h2>
        
        <form id="login-admin-form">
            <div class="form-group">
                <label>Identificador de Administrador</label>
                <input type="text" id="admin-user" placeholder="Ej: admin_estatal" required>
            </div>
            <div class="form-group">
                <label>Clave de Acceso</label>
                <input type="password" id="admin-pass" placeholder="********" required>
            </div>
            <button type="submit" class="btn-admin">Acceder al Control Estatal</button>
        </form>
    </div>
    <script src="login-ugrd.js" defer></script>
</body>
</html>
