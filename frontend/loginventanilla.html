<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso a Ventanilla por Municipio</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background: linear-gradient(145deg, #1e4b3c, #2a6e5a); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .login-container { background-color: white; border-radius: 40px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); width: 100%; max-width: 420px; padding: 50px 40px; text-align: center; }
        .login-icon { background-color: #1e4b3c; color: white; width: 90px; height: 90px; border-radius: 30px; display: flex; align-items: center; justify-content: center; font-size: 3rem; margin: 0 auto 25px; }
        h2 { color: #1e4b3c; margin-bottom: 10px; font-size: 1.8rem; }
        .subtitle { color: #4b6b5e; margin-bottom: 35px; }
        .form-group { text-align: left; margin-bottom: 25px; }
        label { display: block; font-weight: 600; color: #1e293b; margin-bottom: 8px; }
        .input-group { display: flex; align-items: center; border: 2px solid #e2e8f0; border-radius: 20px; padding: 0 15px; transition: 0.2s; }
        .input-group:focus-within { border-color: #1e4b3c; box-shadow: 0 0 0 3px rgba(30,75,60,0.2); }
        .input-group i { color: #1e4b3c; font-size: 1.2rem; }
        .input-group input { width: 100%; padding: 15px; border: none; background: transparent; font-size: 1rem; outline: none; }
        .btn-login { background: linear-gradient(145deg, #1e4b3c, #14382d); color: white; border: none; width: 100%; padding: 16px; border-radius: 40px; font-size: 1.2rem; font-weight: 600; cursor: pointer; transition: 0.2s; display: flex; align-items: center; justify-content: center; gap: 10px; margin-top: 20px; box-shadow: 0 8px 16px rgba(30,75,60,0.3); }
        .btn-login:hover { transform: translateY(-3px); box-shadow: 0 12px 24px rgba(30,75,60,0.4); }
        .error-message { color: #b91c1c; margin-top: 15px; font-size: 0.9rem; display: none; }
        .demo-users { margin-top: 30px; padding-top: 20px; border-top: 1px dashed #cbd5e1; font-size: 0.85rem; color: #4b6b5e; }
        .demo-users span { display: inline-block; background: #e2f0ea; padding: 5px 12px; border-radius: 30px; margin: 5px; font-weight: 500; }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-icon"><i class="fas fa-map-marked-alt"></i></div>
        <div>
            <a href="Inicioreemo.html" class="btn-inicio" title="Volver al inicio">
                <img src="imagenes/casainicio.png" alt="casa" style="height: 150%;">
            </a>
        </div>
        <style>
            .btn-inicio { position: fixed; bottom: 30px; right: 30px; background: linear-gradient(145deg, #1e4b3c, #14382d); color: white; width: 60px; height: 60px; border-radius: 30px; display: flex; align-items: center; justify-content: center; font-size: 1.8rem; box-shadow: 0 8px 16px rgba(0,0,0,0.3); transition: 0.2s; text-decoration: none; z-index: 1000; }
            .btn-inicio:hover { transform: scale(1.1); background: #1e4b3c; }
        </style>
        <h2>Acceso por Municipio</h2>
        <div class="subtitle">Ingrese el nombre del municipio y su contraseña</div>

        <form id="loginForm">
            <div class="form-group">
                <label>Municipio (usuario)</label>
                <div class="input-group">
                    <i class="fas fa-map-marker-alt"></i>
                    <input type="text" id="username" placeholder="Ej. Chihuahua" required autofocus>
                </div>
            </div>
            <div class="form-group">
                <label>Contraseña</label>
                <div class="input-group">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="password" placeholder="••••••••" required>
                </div>
            </div>
            <button type="submit" class="btn-login"><i class="fas fa-sign-in-alt"></i> Ingresar</button>
            <div id="errorMsg" class="error-message">Municipio o contraseña incorrectos</div>
        </form>
    </div>

    <!-- Ya terminé la integración con la base de datos para el login de ventanillas --- Diego-->
    <script>
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const username = document.getElementById('username').value.trim().toLowerCase();
            const password = document.getElementById('password').value.trim().toLowerCase();

            try {
                const response = await fetch('/api/ventanillas/validar', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                const data = await response.json();
                if (data.success) {
                    const municipioCapitalizado = data.municipio.charAt(0).toUpperCase() + data.municipio.slice(1);
                    sessionStorage.setItem('ventanillaUser', municipioCapitalizado);
                    window.location.href = 'ventanilla.html';
                } else {
                    document.getElementById('errorMsg').style.display = 'block';
                }
            } catch (error) {
                console.error('Error:', error);
                document.getElementById('errorMsg').style.display = 'block';
            }
        });
    </script>
</body>
</html>
