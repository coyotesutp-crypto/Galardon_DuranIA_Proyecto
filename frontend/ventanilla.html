<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ventanilla - Productores locales</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background: linear-gradient(145deg, #eef2f7 0%, #d9e2ec 100%); min-height: 100vh; padding: 30px 20px; }
        .ventanilla-container { max-width: 1300px; margin: 0 auto; background-color: white; border-radius: 32px; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25); overflow: hidden; }
        .header { background: linear-gradient(135deg, #1e4b3c, #2a6e5a); color: white; padding: 20px 40px; display: flex; align-items: center; gap: 20px; flex-wrap: wrap; }
        .header i { font-size: 2rem; background-color: rgba(255,255,255,0.15); padding: 12px; border-radius: 18px; }
        .header h1 { font-size: 1.8rem; font-weight: 600; }
        .user-info { margin-left: auto; display: flex; align-items: center; gap: 20px; background: rgba(255,255,255,0.1); padding: 8px 20px 8px 25px; border-radius: 40px; }
        .user-info i { font-size: 1.2rem; background: none; padding: 0; }
        .btn-logout { background: rgba(255,255,255,0.2); border: none; color: white; padding: 8px 20px; border-radius: 30px; cursor: pointer; font-size: 0.95rem; font-weight: 500; display: flex; align-items: center; gap: 8px; transition: 0.2s; }
        .btn-logout:hover { background: rgba(255,255,255,0.3); }
        .content { padding: 40px; }
        .action-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; flex-wrap: wrap; gap: 20px; }
        .btn-agregar { background: linear-gradient(145deg, #1e4b3c, #14382d); color: white; border: none; padding: 15px 35px; border-radius: 60px; font-size: 1.2rem; font-weight: 600; cursor: pointer; transition: 0.2s; display: inline-flex; align-items: center; gap: 12px; box-shadow: 0 8px 16px rgba(30,75,60,0.3); text-decoration: none; }
        .btn-agregar:hover { transform: translateY(-3px); box-shadow: 0 12px 24px rgba(30,75,60,0.4); }
        .btn-export { background: #2c7a4d; color: white; border: none; padding: 12px 25px; border-radius: 40px; font-weight: 600; display: inline-flex; align-items: center; gap: 8px; cursor: pointer; transition: 0.2s; }
        .btn-export:hover { background: #1e5f38; }
        .search-box { display: flex; gap: 10px; background: #f0f5fa; padding: 5px; border-radius: 50px; align-items: center; }
        .search-box i { color: #1e4b3c; margin-left: 15px; }
        .search-box input { border: none; background: transparent; padding: 12px 15px 12px 5px; font-size: 1rem; width: 250px; outline: none; }
        .table-container { background-color: #f8fbfe; border-radius: 24px; padding: 20px; overflow-x: auto; box-shadow: inset 0 2px 4px rgba(0,0,0,0.02); }
        table { width: 100%; border-collapse: collapse; min-width: 900px; }
        th { text-align: left; padding: 16px 12px; background-color: #e0ede7; color: #1e4b3c; font-weight: 600; font-size: 0.95rem; border-radius: 16px 16px 0 0; }
        td { padding: 16px 12px; border-bottom: 1px solid #d0e2d9; color: #1e293b; }
        tr:last-child td { border-bottom: none; }
        tr:hover td { background-color: #ecf6f2; }
        .badge { background-color: #c8e6d9; color: #1e4b3c; padding: 4px 12px; border-radius: 30px; font-size: 0.85rem; font-weight: 600; display: inline-block; }
        .action-buttons { display: flex; gap: 8px; flex-wrap: wrap; }
        .btn-icon { background: none; border: 1px solid #cbd5e1; width: 38px; height: 38px; border-radius: 38px; display: inline-flex; align-items: center; justify-content: center; color: #1e4b3c; cursor: pointer; transition: 0.2s; font-size: 1rem; text-decoration: none; }
        .btn-icon:hover { background-color: #1e4b3c; border-color: #1e4b3c; color: white; }
        .pagination { display: flex; justify-content: flex-end; margin-top: 30px; gap: 10px; }
        .pagination button { background: white; border: 1px solid #cbd5e1; padding: 10px 18px; border-radius: 40px; cursor: pointer; font-weight: 500; transition: 0.2s; }
        .pagination button:hover { background-color: #1e4b3c; color: white; border-color: #1e4b3c; }
        .pagination button.active { background-color: #1e4b3c; color: white; border-color: #1e4b3c; }
        .empty-state { text-align: center; padding: 60px 20px; color: #6b7a8a; }
        .empty-state i { font-size: 4rem; margin-bottom: 15px; opacity: 0.5; }
        @media (max-width: 700px) { .header { flex-direction: column; align-items: flex-start; } .user-info { margin-left: 0; width: 100%; justify-content: space-between; } .action-bar { flex-direction: column; align-items: stretch; } .search-box { width: 100%; } .search-box input { width: 100%; } }
        .btn-inicio { position: fixed; bottom: 30px; right: 30px; background: linear-gradient(145deg, #1e4b3c, #14382d); color: white; width: 60px; height: 60px; border-radius: 30px; display: flex; align-items: center; justify-content: center; font-size: 1.8rem; box-shadow: 0 8px 16px rgba(0,0,0,0.3); transition: 0.2s; text-decoration: none; z-index: 1000; }
        .btn-inicio:hover { transform: scale(1.1); background: #1e4b3c; }
    </style>
</head>
<body>
    <div class="ventanilla-container">
        <div class="header">
            <i class="fas fa-address-book"></i>
            <div>
                <h1>Ventanilla de Productores</h1>
                <p>Gestione los productores de su municipio</p>
            </div>
            <div class="user-info" id="userInfo">
                <i class="fas fa-user-circle"></i>
                <span id="usernameDisplay">Usuario</span>
                <button class="btn-logout" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Salir</button>
            </div>
        </div>

        <div class="content">
            <div class="action-bar">
                <a href="formulario.html" class="btn-agregar"><i class="fas fa-plus-circle"></i> Nuevo productor</a>
                <div class="search-box">
                    <i class="fas fa-search"></i>
                    <input type="text" id="searchInput" placeholder="Buscar por nombre, rancho o teléfono...">
                </div>
                <button id="exportExcelBtn" class="btn-export"><i class="fas fa-file-excel"></i> Exportar a Excel</button>
            </div>

            <div class="table-container">
                <table id="productoresTable">
                    <thead>
                        <tr><th>Nombre</th><th>Rancho</th><th>Municipio</th><th>Teléfono</th><th>Total cabezas</th><th>Acciones</th>\
                    </thead>
                    <tbody id="tableBody"></tbody>
                 </table>
                <div id="emptyMessage" class="empty-state" style="display: none;">
                    <i class="fas fa-frown"></i>
                    <h3>No hay productores en este municipio</h3>
                    <p>Comienza agregando un nuevo productor.</p>
                </div>
            </div>
            <div class="pagination" id="pagination"></div>
        </div>
    </div>
    <script type="module">
        import { obtenerProductores } from './api.js';

        // ya funcionanda la verificación de sesión y la redirección al login si no hay sesión --Valeria.
        function verificarSesion() {
            const user = sessionStorage.getItem('ventanillaUser');
            console.log('Usuario de sesión:', user);
            if (!user) {
                window.location.href = 'loginventanilla.html';
                return false;
            } else {
                document.getElementById('usernameDisplay').textContent = user;
                return user;
            }
        }

        const user = verificarSesion();
        if (!user) {
            throw new Error('No hay sesión');
        }

        document.getElementById('logoutBtn').addEventListener('click', () => {
            sessionStorage.removeItem('ventanillaUser');
            window.location.href = 'loginventanilla.html';
        });

        const municipioUsuario = user.charAt(0).toUpperCase() + user.slice(1).toLowerCase();
        console.log('Municipio a buscar:', municipioUsuario);

        const searchInput = document.getElementById('searchInput');
        const tableBody = document.getElementById('tableBody');
        const emptyMessage = document.getElementById('emptyMessage');
        const paginationDiv = document.getElementById('pagination');
        const exportBtn = document.getElementById('exportExcelBtn');

        let productoresDelMunicipio = [];
        let filteredProductores = [];
        let currentPage = 1;
        const rowsPerPage = 5;

        // ya calcula el total de cabezas sumando los grupos de ganado ---Diego.
        function calcularTotalCabezas(prod) {
            let total = 0;
            if (prod.gruposGanado) {
                prod.gruposGanado.forEach(grupo => {
                    total += (parseInt(grupo.vientres) || 0) +
                             (parseInt(grupo.crias) || 0) +
                             (parseInt(grupo.sementales) || 0) +
                             (parseInt(grupo.vaquillas) || 0) +
                             (parseInt(grupo.novillos) || 0) +
                             (parseInt(grupo.engorda) || 0) +
                             (parseInt(grupo.otras_cant) || 0);
                });
            }
            return total;
        }
        function renderTabla() {
            const start = (currentPage - 1) * rowsPerPage;
            const end = start + rowsPerPage;
            const pageData = filteredProductores.slice(start, end);

            if (filteredProductores.length === 0) {
                tableBody.innerHTML = '';
                emptyMessage.style.display = 'block';
                paginationDiv.innerHTML = '';
                return;
            }
            emptyMessage.style.display = 'none';

            let html = '';
            pageData.forEach(prod => {
                const total = calcularTotalCabezas(prod);
                html += `
                    <tr>
                        <td><strong>${prod.nombre}</strong><br><small>${prod.localidad || ''}</small></td>
                        <td>${prod.rancho}</td>
                        <td><span class="badge">${prod.municipio}</span></td>
                        <td>${prod.telefono}</td>
                        <td>${total}</td>
                        <td class="action-buttons">
                            <a href="perfil.html?id=${prod.id}" class="btn-icon" title="Ver perfil"><i class="fas fa-eye"></i></a>
                            <a href="formulario.html?productor=${prod.id}&accion=editar" class="btn-icon" title="Editar datos"><i class="fas fa-edit"></i></a>
                            <a href="formulario.html?productor=${prod.id}&accion=agregarGanado" class="btn-icon" title="Agregar ganado"><i class="fas fa-paw"></i></a>
                        </td>
                    </tr>
                `;
            });
            tableBody.innerHTML = html;

            const totalPages = Math.ceil(filteredProductores.length / rowsPerPage);
            let pagHtml = '';
            for (let i = 1; i <= totalPages; i++) {
                pagHtml += `<button class="${i === currentPage ? 'active' : ''}" onclick="window.irPagina(${i})">${i}</button>`;
            }
            paginationDiv.innerHTML = pagHtml;
        }

        window.irPagina = (page) => {
            currentPage = page;
            renderTabla();
        };

        // el filtro de búsqueda en tiempo real --Oscar.
        function filtrarProductores() {
            const busqueda = searchInput.value.toLowerCase().trim();
            if (busqueda === '') {
                filteredProductores = productoresDelMunicipio;
            } else {
                filteredProductores = productoresDelMunicipio.filter(prod =>
                    prod.nombre.toLowerCase().includes(busqueda) ||
                    prod.rancho.toLowerCase().includes(busqueda) ||
                    (prod.telefono && prod.telefono.includes(busqueda))
                );
            }
            currentPage = 1;
            renderTabla();
        }

        searchInput.addEventListener('input', filtrarProductores);

        // Ahora si quedo la exportación a Excel. Se usp SheetJS. --- DIego
        function exportarExcel() {
            const datosExcel = filteredProductores.map(prod => ({
                'Nombre': prod.nombre,
                'Rancho': prod.rancho,
                'Municipio': prod.municipio,
                'Localidad': prod.localidad,
                'Teléfono': prod.telefono,
                'Total Cabezas': calcularTotalCabezas(prod),
                'Tenencia': prod.tenencia,
                'Folio': prod.folio,
                'Fecha Alta': prod.fecha_alta
            }));
            const ws = XLSX.utils.json_to_sheet(datosExcel);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, 'Productores');
            XLSX.writeFile(wb, `productores_${municipioUsuario}.xlsx`);
        }

        exportBtn.addEventListener('click', exportarExcel);

        // Ya conecté con la API para cargar los productores del municipio --- Diego.
        async function cargarProductores() {
            try {
                console.log('🔍 Llamando a obtenerProductores con:', municipioUsuario);
                productoresDelMunicipio = await obtenerProductores(municipioUsuario);
                console.log('✅ Productores obtenidos:', productoresDelMunicipio);
                filtrarProductores();
            } catch (error) {
                console.error('❌ Error cargando productores:', error);
                alert('No se pudieron cargar los productores. Verifica que el backend esté corriendo.\n' + error.message);
            }
        }

        cargarProductores();
    </script>
</body>
</html>
